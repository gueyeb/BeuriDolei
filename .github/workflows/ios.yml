name: iOS CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build and test BeuriDolei
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xcode version
        run: |
          xcodebuild -version
          xcodebuild -project BeuriDolei/BeuriDolei.xcodeproj -list

      - name: Select iPhone simulator
        id: simulator
        run: |
          set -euo pipefail
          device_id="$(
            xcrun simctl list devices available --json |
            ruby -rjson -e '
              devices = JSON.parse(STDIN.read).fetch("devices").values.flatten
              iphone = devices.find { |d| d["isAvailable"] && d["name"].start_with?("iPhone") }
              abort("No available iPhone simulator found") unless iphone
              puts iphone.fetch("udid")
            '
          )"
          echo "device_id=$device_id" >> "$GITHUB_OUTPUT"

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -project BeuriDolei/BeuriDolei.xcodeproj \
            -scheme BeuriDolei \
            -configuration Debug \
            -destination "id=${{ steps.simulator.outputs.device_id }}"
